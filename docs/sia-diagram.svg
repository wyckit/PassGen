<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="900" height="430" fill="#0d1117"/>

  <!-- ===== Top: common pattern ===== -->
  <text x="30" y="42" fill="#f85149" font-size="18" font-weight="700">Common agent pattern &#8212; language has too much authority</text>

  <g font-size="13" text-anchor="middle">
    <rect x="30"  y="64" width="190" height="52" rx="8" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
    <text x="125" y="86" fill="#e6edf3">user / web /</text>
    <text x="125" y="104" fill="#e6edf3">tool text</text>

    <rect x="290" y="64" width="120" height="52" rx="8" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
    <text x="350" y="95" fill="#e6edf3" font-weight="700">LLM</text>

    <rect x="480" y="64" width="130" height="52" rx="8" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
    <text x="545" y="95" fill="#e6edf3">tool call</text>

    <rect x="680" y="64" width="190" height="52" rx="8" fill="#3d1417" stroke="#f85149" stroke-width="1.5"/>
    <text x="775" y="95" fill="#ff9492" font-weight="700">ACTION</text>
  </g>
  <g stroke="#f85149" stroke-width="2" fill="none" marker-end="url(#arrowR)">
    <line x1="220" y1="90" x2="285" y2="90"/>
    <line x1="410" y1="90" x2="475" y2="90"/>
    <line x1="610" y1="90" x2="675" y2="90"/>
  </g>
  <text x="775" y="138" fill="#8b949e" font-size="11" text-anchor="middle">"hope the guardrails hold"</text>

  <line x1="30" y1="178" x2="870" y2="178" stroke="#30363d" stroke-width="1"/>

  <!-- ===== Bottom: SIA ===== -->
  <text x="30" y="216" fill="#3fb950" font-size="18" font-weight="700">Symbolic Intent Architecture &#8212; language becomes verified intent before action</text>

  <g font-size="12.5" text-anchor="middle">
    <rect x="20"  y="246" width="118" height="56" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
    <text x="79" y="270" fill="#e6edf3">prompt</text>
    <text x="79" y="288" fill="#8b949e" font-size="10">proposes</text>

    <rect x="168" y="246" width="128" height="56" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
    <text x="232" y="266" fill="#e6edf3">language</text>
    <text x="232" y="282" fill="#e6edf3">resolver + TLM</text>
    <text x="232" y="296" fill="#8b949e" font-size="10">constrains</text>

    <rect x="326" y="246" width="120" height="56" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
    <text x="386" y="270" fill="#e6edf3">typed intent</text>
    <text x="386" y="288" fill="#8b949e" font-size="10">inspectable</text>

    <rect x="476" y="246" width="120" height="56" rx="8" fill="#16241a" stroke="#3fb950" stroke-width="2"/>
    <text x="536" y="270" fill="#7ee787" font-weight="700">validator</text>
    <text x="536" y="288" fill="#8b949e" font-size="10">the law (gate)</text>

    <rect x="626" y="246" width="110" height="56" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
    <text x="681" y="270" fill="#e6edf3">tool</text>
    <text x="681" y="288" fill="#8b949e" font-size="10">deterministic</text>

    <rect x="766" y="246" width="114" height="56" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
    <text x="823" y="270" fill="#e6edf3">verifier</text>
    <text x="823" y="288" fill="#8b949e" font-size="10">+ audit</text>
  </g>
  <g stroke="#3fb950" stroke-width="2" fill="none" marker-end="url(#arrowG)">
    <line x1="138" y1="274" x2="166" y2="274"/>
    <line x1="296" y1="274" x2="324" y2="274"/>
    <line x1="446" y1="274" x2="474" y2="274"/>
    <line x1="596" y1="274" x2="624" y2="274"/>
    <line x1="736" y1="274" x2="764" y2="274"/>
  </g>

  <text x="450" y="356" fill="#e6edf3" font-size="15" font-weight="700" text-anchor="middle">Don&#8217;t execute language. Execute verified intent.</text>
  <text x="450" y="382" fill="#8b949e" font-size="12" text-anchor="middle">Raw language never reaches the tool &#8212; impossible intent is rejected at the gate, fail-closed.</text>

  <defs>
    <marker id="arrowR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#f85149"/></marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#3fb950"/></marker>
  </defs>
</svg>
