name: Demo GIF

# Renders docs/demo.tape -> docs/demo.gif with VHS and commits it back.
# Runs only when the tape or the trace-producing code changes (or on demand),
# so it doesn't churn the binary on every push. The auto-commit uses
# "[skip ci]" and docs/demo.gif is intentionally NOT in the trigger paths,
# so the commit can't retrigger this workflow.

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'docs/demo.tape'
      - 'PassGen.App/**'
      - 'PassGen.Engine/**'
      - '.github/workflows/demo-gif.yml'

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained passgen (linux-x64)
        run: dotnet publish PassGen.App/PassGen.App.csproj -c Release -r linux-x64 --self-contained true -o ./publish/app

      - name: Put passgen on PATH
        run: sudo ln -sf "$PWD/publish/app/passgen" /usr/local/bin/passgen

      - name: Smoke-check the CLI (also confirms it finds dataset/compiled)
        run: passgen --trace "16 chars, 2 uppercase, no ambiguous"

      - name: Install ffmpeg (VHS needs it to encode the GIF)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Render the tape -> docs/demo.gif
        uses: charmbracelet/vhs-action@v2
        with:
          path: docs/demo.tape

      - name: Ensure the GIF was actually produced
        run: test -s docs/demo.gif || { echo "::error::docs/demo.gif was not produced by VHS"; exit 1; }

      - name: Commit the GIF if it changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- docs/demo.gif; then
            echo "docs/demo.gif unchanged — nothing to commit."
          else
            git add docs/demo.gif
            git commit -m "docs: auto-render demo GIF [skip ci]"
            git push
          fi
